# VPS Nginx Configuration
# 位置: /etc/nginx/sites-enabled/vps.bluelaser.cn.conf
#
# 安装:
#   sudo ln -sf /home/yaka/Documents/Nanochat/nginx/vps.bluelaser.cn.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name vps.bluelaser.cn;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name vps.bluelaser.cn;

    ssl_certificate /etc/ssl/bluelaser.cn.crt;
    ssl_certificate_key /etc/ssl/bluelaser.cn.key;
    ssl_protocols TLSv1.2 TLSv1.3;

    # 3x-ui 管理面板 → :8080
    location /admin/ {
        proxy_pass https://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_ssl_verify off;
        # 不传递 X-Real-IP 和 X-Forwarded-For，避免 title 显示客户端 IP
    }

    # 订阅 → :8088
    location /vpssub/ {
        proxy_pass https://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_verify off;
    }

    # SubConverter → :25500
    location /sub {
        proxy_pass http://127.0.0.1:25500;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        return 404;
    }
}
