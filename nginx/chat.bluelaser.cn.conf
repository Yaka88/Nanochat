# Nanochat Nginx Configuration
# 位置: /etc/nginx/sites-enabled/chat.bluelaser.cn.conf
# 全局 Nginx (系统级)，不在 Docker 内部
# 
# 安装配置:
#   sudo ln -sf /home/yaka/Documents/Nanochat/nginx/chat.bluelaser.cn.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# HTTP 重定向到 HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name chat.bluelaser.cn;

    # ACME 验证文件目录（如需要 HTTP 验证方式）
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # 其他所有请求重定向到 HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS 主配置
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name chat.bluelaser.cn;

    # SSL 证书 (泛域名证书 *.bluelaser.cn)
    ssl_certificate /etc/ssl/bluelaser.cn.crt;
    ssl_certificate_key /etc/ssl/bluelaser.cn.key;

    # SSL 安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # HSTS (启用后需谨慎，影响持久)
    # add_header Strict-Transport-Security "max-age=63072000" always;

    # 日志
    access_log /var/log/nginx/chat.bluelaser.cn.access.log;
    error_log /var/log/nginx/chat.bluelaser.cn.error.log;

    # 最大上传大小（语音消息）
    client_max_body_size 50M;

    # 通用代理头配置
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ========================================
    # 管理后台静态页面
    # ========================================
    location /admin {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
    }

    # ========================================
    # 管理后台 API
    # ========================================
    location /admin/api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
    }

    # ========================================
    # WebSocket 连接 (Socket.io)
    # 用于: 在线状态 + WebRTC 信令
    # ========================================
    location /socket.io/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        
        # WebSocket 升级
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # WebSocket 超时设置（长连接）
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        
        # 禁用缓冲
        proxy_buffering off;
    }

    # ========================================
    # REST API
    # ========================================
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        
        # API 超时设置
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ========================================
    # 静态资源 (头像、语音消息等)
    # ========================================
    location /uploads/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        
        # 静态文件缓存
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # ========================================
    # 根路径 (App 健康检查或其他)
    # ========================================
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
    }
}
