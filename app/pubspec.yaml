name: nanochat
description: Family communication app for elderly users
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # Network
  http: ^1.2.0
  socket_io_client: ^2.0.3+1
  # Storage
  shared_preferences: ^2.2.2
  # QR Code
  qr_flutter: ^4.1.0
  mobile_scanner: ^5.1.1
  # WebRTC
  flutter_webrtc: ^1.0.0
  # Audio recording
  record: ^6.1.1
  audioplayers: ^6.0.0
  # Permissions
  permission_handler: ^11.3.0
  # Utils
  uuid: ^4.3.3
  intl: ^0.20.2
  provider: ^6.1.1
  path_provider: ^2.1.2
  image_picker: ^1.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
