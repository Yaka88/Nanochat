name: iOS Build & Test

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    defaults:
      run:
        working-directory: ./app

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Initialize App Skeleton (Cloud Bootstrap)
        run: |
          mkdir -p ../temp_lib
          mkdir -p ../temp_assets
          cp -r lib/* ../temp_lib/
          if [ -d assets ] && [ "$(ls -A assets 2>/dev/null)" ]; then
            cp -r assets/. ../temp_assets/
          fi
          cp pubspec.yaml ../temp_pubspec.yaml
          rm -rf *
          flutter create --org cn.bluelaser.nanochat .
          rm -rf lib/*
          rm -rf assets/*
          cp -r ../temp_lib/* lib/
          if [ "$(ls -A ../temp_assets 2>/dev/null)" ]; then
            mkdir -p assets
            cp -r ../temp_assets/. assets/
          fi
          cp ../temp_pubspec.yaml pubspec.yaml

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Build iOS (No Sign)
        run: flutter build ios --release --no-codesign

      - name: Create IPA for Sideloading
        run: |
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r Nanochat.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nanochat-ios-ipa
          path: app/Nanochat.ipa
