name: iOS Build & Test

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    defaults:
      run:
        working-directory: ./app

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Add GoogleService-Info.plist
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: |
          if [ -n "$GOOGLE_SERVICE_INFO_PLIST" ]; then
            echo "$GOOGLE_SERVICE_INFO_PLIST" > ios/Runner/GoogleService-Info.plist
            echo "✅ Created GoogleService-Info.plist from secret"
          else
            echo "⚠️ Secret GOOGLE_SERVICE_INFO_PLIST is not set. App might crash on startup."
          fi

      - name: Build iOS (No Sign)
        run: flutter build ios --release --no-codesign

      - name: Create IPA for Sideloading
        run: |
          mkdir -p Payload
          mv build/ios/iphoneos/Runner.app Payload/
          zip -r Nanochat.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nanochat-ios-ipa
          path: app/Nanochat.ipa
