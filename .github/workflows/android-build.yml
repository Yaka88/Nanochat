name: Android Build & Release

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./app
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Enable Android Shrink (CI Patch)
        run: |
          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's/isMinifyEnabled = false/isMinifyEnabled = true/g' android/app/build.gradle.kts
            sed -i 's/isShrinkResources = false/isShrinkResources = true/g' android/app/build.gradle.kts
          elif [ -f android/app/build.gradle ]; then
            sed -i 's/minifyEnabled false/minifyEnabled true/g' android/app/build.gradle
            sed -i 's/shrinkResources false/shrinkResources true/g' android/app/build.gradle
          fi

      - name: Reset Gradle Wrapper Cache
        run: |
          rm -rf ~/.gradle/wrapper/dists

      - name: Add Google Services JSON
        env:
          GOOGLE_SERVICES_JSON: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GOOGLE_SERVICES_JSON" ]; then
            echo "$GOOGLE_SERVICES_JSON" > android/app/google-services.json
            echo "✅ Created google-services.json from secret"
          else
            echo "⚠️ Secret GOOGLE_SERVICES_JSON is not set. Build might fail."
          fi

      - name: Setup Signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > android/nanochat-signing.jks
            echo "storePassword=$STORE_PASSWORD" > android/key.properties
            echo "keyPassword=$KEY_PASSWORD" >> android/key.properties
            echo "keyAlias=$KEY_ALIAS" >> android/key.properties
            echo "storeFile=../nanochat-signing.jks" >> android/key.properties
            echo "✅ Signing configured from secrets"
          else
            echo "⚠️ KEYSTORE_BASE64 secret not set. APK will use debug signing."
          fi

      - name: Build APK
        run: |
          flutter build apk --release --target-platform android-arm64 --obfuscate --split-debug-info=build/symbols --tree-shake-icons

      - name: Rename APK
        run: |
          APK_DIR="build/app/outputs/flutter-apk"
          ls -lah "$APK_DIR"
          SOURCE_APK=""

          if [ -f "$APK_DIR/app-arm64-v8a-release.apk" ]; then
            SOURCE_APK="$APK_DIR/app-arm64-v8a-release.apk"
          elif [ -f "$APK_DIR/app-release.apk" ]; then
            SOURCE_APK="$APK_DIR/app-release.apk"
          else
            SOURCE_APK=$(find "$APK_DIR" -maxdepth 1 -type f -name "*.apk" | head -n 1)
          fi

          if [ -z "$SOURCE_APK" ]; then
            echo "No APK found in $APK_DIR"
            exit 1
          fi

          cp "$SOURCE_APK" Nanochat-arm64.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v6
        with:
          name: nanochat-release-apk-arm64
          path: app/Nanochat-arm64.apk
