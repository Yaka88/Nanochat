name: Android Build & Release

on:
  push:
    branches:
      - main
    paths:
      - 'app/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./app
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Initialize App Skeleton (Cloud Bootstrap)
        run: |
          # Move user code out, create a clean skeleton, then restore code
          mkdir -p ../temp_lib
          mkdir -p ../temp_assets
          cp -r lib/* ../temp_lib/
          if [ -d assets ] && [ "$(ls -A assets 2>/dev/null)" ]; then
            cp -r assets/. ../temp_assets/
          fi
          cp pubspec.yaml ../temp_pubspec.yaml
          rm -rf *
          flutter create --org cn.bluelaser.nanochat .
          rm -rf lib/*
          rm -rf assets/*
          cp -r ../temp_lib/* lib/
          if [ "$(ls -A ../temp_assets 2>/dev/null)" ]; then
            mkdir -p assets
            cp -r ../temp_assets/. assets/
          fi
          cp ../temp_pubspec.yaml pubspec.yaml

      - name: Flutter Pub Get
        run: flutter pub get

      - name: Enable Android Shrink (CI Patch)
        run: |
          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's/isMinifyEnabled = false/isMinifyEnabled = true/g' android/app/build.gradle.kts
            sed -i 's/isShrinkResources = false/isShrinkResources = true/g' android/app/build.gradle.kts
          elif [ -f android/app/build.gradle ]; then
            sed -i 's/minifyEnabled false/minifyEnabled true/g' android/app/build.gradle
            sed -i 's/shrinkResources false/shrinkResources true/g' android/app/build.gradle
          fi

      - name: Build APK
        run: |
          flutter build apk \
            --release \
            --target-platform android-arm64 \
            --obfuscate \
            --split-debug-info=build/symbols \
            --tree-shake-icons

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-arm64-v8a-release.apk Nanochat-arm64.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nanochat-release-apk-arm64
          path: app/Nanochat-arm64.apk
