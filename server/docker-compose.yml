services:
  api:
    build: .
    container_name: nanochat-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/nanochat?schema=public"
    volumes:
      - uploads_data:/app/uploads

  db:
    image: postgres:15-alpine
    container_name: nanochat-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nanochat
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5

  coturn:
    image: coturn/coturn:latest
    container_name: nanochat-turn
    restart: unless-stopped
    network_mode: host
    command:
      - "-n"
      - "--log-file=stdout"
      - "--no-cli"
      - "--listening-port=3478"
      - "--listening-ip=${TURN_LISTEN_IP:-0.0.0.0}"
      - "--relay-ip=${TURN_LISTEN_IP:-0.0.0.0}"
      - "--external-ip=${TURN_EXTERNAL_IP}"
      - "--fingerprint"
      - "--use-auth-secret"
      - "--static-auth-secret=${TURN_SECRET:-nanochat-turn-secret}"
      - "--realm=${TURN_HOST:-chat.bluelaser.cn}"
      - "--total-quota=100"
      - "--bps-capacity=0"
      - "--no-multicast-peers"
      - "--no-tls"
      - "--no-dtls"

volumes:
  postgres_data:
  uploads_data:
