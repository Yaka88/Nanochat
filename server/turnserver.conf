# 监听端口
listening-port=3478

# 监听和中继 IP
listening-ip=0.0.0.0
relay-ip=0.0.0.0

# 外部公网 IP (必须修改为你的实际公网 IP)
# 请将 127.0.0.1 替换为你的服务器公网 IP
external-ip=20.72.194.119/10.1.0.4

# 认证与安全
fingerprint
use-auth-secret
static-auth-secret=nanochat-turn-secret
realm=chat.bluelaser.cn
stale-nonce

# 性能与限制
total-quota=100
bps-capacity=0
min-port=49160
max-port=49200
no-multicast-peers

# 禁用 TLS/DTLS (如果不需要加密)
no-tls
no-dtls

# 日志与控制台
no-cli
log-file=stdout
